<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>DreamRack — Panel Designer</title>
<style>
  body { margin:0; font-family:-apple-system,system-ui,sans-serif; background:#1a1a1c; color:#ddd; transition:background .2s; }
  body[data-dark="false"] { background:#dcdcdc; color:#222; }
  #bar { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid #333; flex-wrap:wrap; }
  body[data-dark="false"] #bar { border-color:#bbb; }
  select, button { font:inherit; padding:5px 10px; border-radius:6px; border:1px solid #555; background:#2a2a2e; color:inherit; cursor:pointer; }
  body[data-dark="false"] select, body[data-dark="false"] button { background:#eee; border-color:#aaa; }
  button:disabled { opacity:.4; cursor:default; }
  #saveBtn:not(:disabled) { border-color:#39a0ff; color:#9dcbff; }
  body[data-dark="false"] #saveBtn:not(:disabled) { color:#1667c8; }
  .sep { width:1px; align-self:stretch; background:#444; margin:0 4px; }
  body[data-dark="false"] .sep { background:#bbb; }
  #status { margin-left:auto; opacity:.75; font-size:13px; }
  #readout { padding:6px 16px; font-size:12px; opacity:.6; font-variant-numeric:tabular-nums; border-bottom:1px solid #2a2a2a; }
  body[data-dark="false"] #readout { border-color:#c8c8c8; }
  #stage { display:flex; justify-content:center; align-items:flex-start; padding:36px; overflow:auto; user-select:none; }
</style>
</head>
<body data-dark="true">
  <div id="bar">
    <strong>Panel Designer</strong>
    <select id="picker"></select>
    <button id="darkBtn">Dark</button>
    <span class="sep"></span>
    <button id="saveBtn" disabled>Save</button>
    <button id="revertBtn" disabled>Revert</button>
    <span id="status"></span>
  </div>
  <div id="readout"></div>
  <div id="stage"></div>
  <script type="module" src="designer.js"></script>
</body>
</html>
