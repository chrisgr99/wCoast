<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wcoast — rack</title>
  <style>
    :root {
      --bg: #14110d; --rail: #1c1811; --ink: #f2ead9; --ink-dim: #b6ab93;
      --accent: #e0a353; --accent-ink: #14110d; --line: #3a3226; --panel: #211c15;
      --audio: #ff7300; --control: #1f7fe0;
      --grip: url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2230%22%20height%3D%2230%22%20viewBox%3D%220%200%2030%2030%22%3E%3Cpath%20d%3D%22M3%2C2%20L3%2C20%20L8%2C16%20L11%2C22%20L14%2C21%20L11%2C15%20L18%2C15%20Z%22%20fill%3D%22%23000%22%20stroke%3D%22%23fff%22%20stroke-width%3D%221.4%22%20stroke-linejoin%3D%22round%22%2F%3E%3Cg%20transform%3D%22translate(13%2C12)%22%3E%3Crect%20x%3D%221%22%20y%3D%225%22%20width%3D%2211%22%20height%3D%228%22%20rx%3D%223.5%22%20fill%3D%22%23fafafa%22%20stroke%3D%22%23000%22%20stroke-width%3D%221%22%2F%3E%3Ccircle%20cx%3D%223.2%22%20cy%3D%225%22%20r%3D%221.8%22%20fill%3D%22%23fafafa%22%20stroke%3D%22%23000%22%20stroke-width%3D%221%22%2F%3E%3Ccircle%20cx%3D%226.2%22%20cy%3D%224.2%22%20r%3D%221.8%22%20fill%3D%22%23fafafa%22%20stroke%3D%22%23000%22%20stroke-width%3D%221%22%2F%3E%3Ccircle%20cx%3D%229.2%22%20cy%3D%225%22%20r%3D%221.8%22%20fill%3D%22%23fafafa%22%20stroke%3D%22%23000%22%20stroke-width%3D%221%22%2F%3E%3Ccircle%20cx%3D%221.3%22%20cy%3D%228.5%22%20r%3D%221.9%22%20fill%3D%22%23fafafa%22%20stroke%3D%22%23000%22%20stroke-width%3D%221%22%2F%3E%3C%2Fg%3E%3C%2Fsvg%3E") 3 2, auto;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg); color: var(--ink);
      font-family: -apple-system, system-ui, sans-serif; font-size: 15px;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ---- top toolbar (full width; global controls + the output mixer) ---- */
    #toolbar {
      position: relative; flex: 0 0 auto; display: flex; align-items: flex-end; gap: 12px;
      padding: 2px 12px 0; background: var(--rail);
      border-top: 1px solid #fff; border-bottom: 1px solid #fff; z-index: 30;
    }
    #onoff {
      width: 26px; height: 26px; padding: 0; display: inline-flex; margin-bottom: 2px;
      align-items: center; justify-content: center; cursor: pointer;
      background: var(--accent); border: 1px solid var(--line); border-radius: 6px;
    }
    #onoff svg { width: 14px; height: 14px; fill: var(--accent-ink); }
    #onoff .ico-stop { display: none; }
    #onoff.on .ico-play { display: none; }
    #onoff.on .ico-stop { display: inline; }

    /* the mixer strip in the toolbar */
    #mixer { display: flex; align-items: flex-end; gap: 10px; }
    #mixer-jacks { display: flex; align-items: flex-end; gap: 8px; padding-top: 9px; }
    #mixer-jacks .grp { display: flex; align-items: flex-end; gap: 8px; padding-right: 8px; border-right: 1px solid var(--line); }
    .toolbar-jack { position: relative; cursor: crosshair; }
    .toolbar-jack svg { display: block; width: 22px; height: 22px; }
    .toolbar-jack .lbl { position: absolute; top: -2px; left: -3px; font-size: 9px; font-weight: 600; color: var(--ink-dim); line-height: 1; pointer-events: none; }
    #mixer label, #mixer #masterLabel { font-size: 12px; color: var(--ink-dim); }
    #mixer input[type=range] { width: 120px; height: 14px; accent-color: var(--accent); margin-bottom: 3px; }
    #mixer-open {
      font: inherit; font-size: 12px; padding: 4px 10px; margin-bottom: 2px; border-radius: 6px; cursor: pointer;
      background: transparent; color: var(--ink); border: 1px solid var(--line);
    }

    /* overlay for the vertical connection lines that meet the rack cords */
    #toolbar-lines { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }

    body.grabbing-cable, body.grabbing-cable * { cursor: var(--grip) !important; }

    /* ---- mixer control panel (floating window) ---- */
    #mixer-panel { position: fixed; z-index: 1200; width: 520px; aspect-ratio: 250 / 174;
      border: 2px solid #000; border-radius: 12px; overflow: hidden; cursor: move;
      box-shadow: 0 10px 30px rgba(0,0,0,0.55); touch-action: none; user-select: none; -webkit-user-select: none; }
    #mixer-panel svg { display: block; width: 100%; height: 100%; }

    /* ---- rack (single scrolling viewport with a scaled content area) ---- */
    #rack { flex: 1 1 auto; min-height: 0; overflow: auto; position: relative; background: var(--bg); }
    .rack-content { position: relative; }
    .rack-row {
      position: absolute; left: 0;
      background: var(--rail); border: 1px solid #0b0906; overflow: visible;
      box-shadow: inset 0 0 12px rgba(0,0,0,0.5);
    }
    .rack-module {
      position: absolute; top: 0; cursor: default;
      user-select: none; -webkit-user-select: none; touch-action: none;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));
    }
    .rack-module.dragging { opacity: 0.85; z-index: 20; }
    .rack-module svg { display: block; width: 100%; height: 100%; }
    .rack-ghost {
      position: absolute; top: 0; pointer-events: none; z-index: 15;
      border: 2px dashed var(--accent); border-radius: 4px; background: rgba(224,163,83,0.12);
    }

    /* ---- context menu ---- */
    .rack-menu {
      position: fixed; z-index: 1000; min-width: 180px; max-height: 72vh; overflow-y: auto;
      background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
      padding: 4px; box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }
    .rack-menu-header { padding: 8px 12px 3px; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-dim); }
    .rack-menu-item { padding: 8px 12px; border-radius: 6px; cursor: pointer; color: var(--ink); }
    .rack-menu-item:hover { background: var(--accent); color: var(--accent-ink); }
    .rack-menu-item.dim { color: var(--ink-dim); }
    .rack-menu-item.dim:hover { color: var(--accent-ink); }
    .rack-menu-check { display: inline-block; width: 1.2em; margin-right: 2px; color: var(--accent); }

    /* ---- patch cables (SVG overlay; pointer-transparent) ---- */
    .rack-cables { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 12; overflow: visible; }
    .rack-cable { fill: none; stroke-linecap: round; opacity: 0.95; }
    .rack-cable-temp { opacity: 0.8; stroke-dasharray: 4 3; }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="onoff" aria-label="Sound on/off" title="Sound on/off">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <polygon class="ico-play" points="7,5 19,12 7,19"/>
        <rect class="ico-stop" x="6" y="6" width="12" height="12" rx="2"/>
      </svg>
    </button>
    <div id="mixer">
      <div id="mixer-jacks"></div>
      <button id="mixer-open" title="Open mixer controls">Mixer</button>
      <label for="master">Master</label>
      <input id="master" type="range" min="0" max="1" step="0.01" value="0.7">
      <span id="masterLabel">0.70</span>
    </div>
    <svg id="toolbar-lines" aria-hidden="true"></svg>
  </div>
  <div id="rack"></div>

  <script type="module" src="debug/rack-app.js"></script>
</body>
</html>
