<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wcoast — rack</title>
  <style>
    :root {
      --bg: #14110d; --rail: #1c1811; --ink: #f2ead9; --ink-dim: #b6ab93;
      --accent: #e0a353; --accent-ink: #14110d; --line: #3a3226; --panel: #211c15;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg); color: var(--ink);
      font-family: -apple-system, system-ui, sans-serif; font-size: 15px;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ---- top toolbar (full width; global controls live here) ---- */
    #toolbar {
      flex: 0 0 auto; display: flex; align-items: center; gap: 12px;
      padding: 3px 12px; background: var(--rail);
      border-top: 1px solid #fff; border-bottom: 1px solid #fff;
      z-index: 30;
    }
    #onoff {
      width: 26px; height: 26px; padding: 0; display: inline-flex;
      align-items: center; justify-content: center; cursor: pointer;
      background: var(--accent); border: 1px solid var(--line); border-radius: 6px;
    }
    #onoff svg { width: 14px; height: 14px; fill: var(--accent-ink); }
    #onoff .ico-stop { display: none; }
    #onoff.on .ico-play { display: none; }
    #onoff.on .ico-stop { display: inline; }
    #toolbar label { color: var(--ink-dim); font-size: 13px; }
    #toolbar #masterLabel { font-size: 13px; color: var(--ink-dim); }
    #toolbar input[type=range] { width: 130px; height: 14px; accent-color: var(--accent); }

    /* ---- rack (single scrolling viewport with a scaled content area) ---- */
    #rack { flex: 1 1 auto; min-height: 0; overflow: auto; position: relative; background: var(--bg); }
    .rack-content { position: relative; }
    .rack-row {
      position: absolute; left: 0;
      background: var(--rail);
      border: 1px solid #0b0906;
      overflow: visible;
      box-shadow: inset 0 0 12px rgba(0,0,0,0.5);
    }
    .rack-module {
      position: absolute; top: 0; cursor: default;
      user-select: none; -webkit-user-select: none; touch-action: none;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));
    }
    .rack-module.dragging { opacity: 0.85; z-index: 20; }
    .rack-module svg { display: block; width: 100%; height: 100%; }
    .rack-ghost {
      position: absolute; top: 0; pointer-events: none; z-index: 15;
      border: 2px dashed var(--accent); border-radius: 4px;
      background: rgba(224,163,83,0.12);
    }

    /* ---- context menu ---- */
    .rack-menu {
      position: fixed; z-index: 1000; min-width: 180px; max-height: 72vh; overflow-y: auto;
      background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
      padding: 4px; box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }
    .rack-menu-header { padding: 8px 12px 3px; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-dim); }
    .rack-menu-item { padding: 8px 12px; border-radius: 6px; cursor: pointer; color: var(--ink); }
    .rack-menu-item:hover { background: var(--accent); color: var(--accent-ink); }
    .rack-menu-item.dim { color: var(--ink-dim); }
    .rack-menu-item.dim:hover { color: var(--accent-ink); }
    .rack-menu-check { display: inline-block; width: 1.2em; margin-right: 2px; color: var(--accent); }

    /* ---- patch cables (SVG overlay; pointer-transparent) ---- */
    .rack-cables { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 12; overflow: visible; }
    .rack-cable { fill: none; stroke-linecap: round; opacity: 0.95; }
    .rack-cable-temp { opacity: 0.8; stroke-dasharray: 4 3; }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="onoff" aria-label="Sound on/off" title="Sound on/off">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <polygon class="ico-play" points="7,5 19,12 7,19"/>
        <rect class="ico-stop" x="6" y="6" width="12" height="12" rx="2"/>
      </svg>
    </button>
    <label for="master">Master</label>
    <input id="master" type="range" min="0" max="1" step="0.01" value="0.3">
    <span id="masterLabel">0.30</span>
  </div>
  <div id="rack"></div>

  <script type="module" src="debug/rack-app.js"></script>
</body>
</html>
